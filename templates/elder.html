<!DOCTYPE html>
<html lang="th">
<body>
<h1>💊 เตือนกินยา</h1>

{% for m in meds %}
<div style="margin:20px;padding:20px;border:1px solid #ccc">
<h2>{{m[1]}}</h2>
<p>เวลา {{m[2]}}</p>

{% if m[3] == 1 %}
<b>✔ กินแล้ววันนี้</b>
{% else %}
<form method="post">
<input type="hidden" name="mid" value="{{m[0]}}">
<button style="font-size:24px">กินยาแล้ว</button>
</form>
{% endif %}
</div>
{% endfor %}

<a href="/caregiver">⚙ ผู้ดูแล</a>
</body>
</html>
